/* ================= EVENT SYSTEM ================= */

function drawWorldEvent() {
  let pool = worldEventPools.act1;
  let event = pool[Math.floor(Math.random() * pool.length)];
  openEventModal(event);
}

function drawBreachEvent() {

  if(breachEventDeck.length === 0){

    breachEventDeck = [...breachEventPools.act2];

    // shuffle deck
    for(let i = breachEventDeck.length - 1; i > 0; i--){
      let j = Math.floor(Math.random() * (i + 1));
      [breachEventDeck[i], breachEventDeck[j]] = [breachEventDeck[j], breachEventDeck[i]];
    }

  }

  let event = breachEventDeck.pop();

  openEventModal(event);

}

function openEventModal(event) {
  document.getElementById("eventTitle").textContent = event.title;
  document.getElementById("eventText").textContent = event.text;

  let container = document.getElementById("eventOptions");
  container.innerHTML = "";

  event.options.forEach(o => {
    let btn = document.createElement("button");
    btn.innerHTML = `<strong>${o.label}</strong><br><small>${o.tag}</small>`;
    btn.onclick = () => {
      container.innerHTML = `
        <h3>Outcome</h3>
        <p>${o.effect}</p>
        <button onclick="closeModal()">Continue</button>
      `;
      addLog(event.title + " — " + o.tag);
    };
    container.appendChild(btn);
  });

  document.getElementById("eventModal").style.display = "flex";
}

function closeModal() {
  document.getElementById("eventModal").style.display = "none";
}

/* ================= WORLD TENSION ================= */

function increaseTension() {
  tension++;
  tensionSinceLastWE++;
  document.getElementById("tensionValue").textContent = tension;

  let box = document.createElement("div");
  box.className = "tensionBox";
  document.getElementById("tensionRow").appendChild(box);

  if (tensionSinceLastWE >= 4) {
    tensionSinceLastWE = 0;
    drawWorldEvent();
  }
}

function decreaseTension() {
  if (tension <= 0) return;
  tension--;
  document.getElementById("tensionValue").textContent = tension;
  let row = document.getElementById("tensionRow");
  if (row.lastChild) row.removeChild(row.lastChild);
}

function resetTension() {
  tension = 0;
  tensionSinceLastWE = 0;
  document.getElementById("tensionValue").textContent = 0;
  document.getElementById("tensionRow").innerHTML = "";
}

/* ================= PRESENCE ================= */

function changePresence(v) {
  presence += v;
  if (presence < 0) presence = 0;

  document.getElementById("presenceValue").textContent = presence;
  document.getElementById("presenceFill").style.width =
    Math.min((presence / 15) * 100, 100) + "%";

  let tier = "Dormant (0–2)";
  if (presence >= 3) tier = "Stirring (3–4)";
  if (presence >= 5) tier = "Unstable (5–6)";
  if (presence >= 7) tier = "Hostile (7–8)";
  if (presence >= 9) tier = "Critical (9–10)";
  if (presence >= 11) tier = "Cataclysm (11+)";

  document.getElementById("presenceTier").textContent = tier;
}

/* ================= HARMONIC ================= */

function changeHarmonic(v) {
  harmonic += v;
  if (harmonic < 0) harmonic = 0;

  document.getElementById("harmonicValue").textContent = harmonic;
  document.getElementById("harmonicFill").style.width =
    Math.min((harmonic / 12) * 100, 100) + "%";

  let tier = "Quiet";
  if (harmonic >= 2) tier = "Vibrating";
  if (harmonic >= 5) tier = "Surging";
  if (harmonic >= 7) tier = "Overtuned";
  if (harmonic >= 10) tier = "Resonant Collapse";

  document.getElementById("harmonicTier").textContent = tier;
}

/* ================= CONVERGENCE ================= */

function changeConvergence(v) {
  convergence += v;
  if (convergence < 0) convergence = 0;

  document.getElementById("convergenceValue").textContent = convergence;
  document.getElementById("convergenceFill").style.width =
    Math.min((convergence / 12) * 100, 100) + "%";

  let tier = "Subtle";

  if (convergence >= 5) tier = "Distorted";
  if (convergence >= 8) tier = "Aligned";
  if (convergence >= 10) tier = "Manifest";

  document.getElementById("convergenceTier").textContent = tier;
}

function increaseBreach() {
  breach++;
  document.getElementById("breachValue").textContent = breach;

  let box = document.createElement("div");
  box.className = "breachBox";
  document.getElementById("breachRow").appendChild(box);

  if (breach % 3 === 0) {
    drawBreachEvent();
  }
}

function decreaseBreach() {
  if (breach <= 0) return;
  breach--;
  document.getElementById("breachValue").textContent = breach;
  let row = document.getElementById("breachRow");
  if (row.lastChild) row.removeChild(row.lastChild);
}

function resetBreach() {
  breach = 0;
  document.getElementById("breachValue").textContent = 0;
  document.getElementById("breachRow").innerHTML = "";
}

/* ================= LOG ================= */

function addLog(msg) {
  let time = new Date().toLocaleTimeString();
  logEntries.unshift("[" + time + "] " + msg);
  renderLog();
}

function renderLog() {
  let c = document.getElementById("logContainer");
  c.innerHTML = "";
  logEntries.forEach(e => {
    let d = document.createElement("div");
    d.textContent = e;
    c.appendChild(d);
  });
}

function clearLog() {
  logEntries = [];
  renderLog();
}

/* ================= RESET SYSTEMS ================= */

function resetPresence(){
  presence = 0;
  document.getElementById("presenceValue").textContent = 0;
  document.getElementById("presenceFill").style.width = "0%";
  document.getElementById("presenceTier").textContent = "Dormant (0–2)";
}

function resetHarmonic(){
  harmonic = 0;
  document.getElementById("harmonicValue").textContent = 0;
  document.getElementById("harmonicFill").style.width = "0%";
  document.getElementById("harmonicTier").textContent = "Quiet";
}

function resetConvergence(){
  convergence = 0;
  document.getElementById("convergenceValue").textContent = 0;
  document.getElementById("convergenceFill").style.width = "0%";
  document.getElementById("convergenceTier").textContent = "Subtle";
}

function resetAlignment(){

alignment = 0;
document.getElementById("alignmentValue").innerText = alignment;

}

function resetTruth(){

truth = 0;

document.getElementById("truthValue").innerText = truth;
document.getElementById("truthMessage").innerText = "";

}

function resetDistortion(){

distortion = 0;

document.getElementById("distortionValue").innerText = distortion;

let eventBox = document.getElementById("distortionEvent");
if(eventBox) eventBox.innerText = "";

}

/* ================= SAVE ================= */

function saveCampaign(){
  let slot=document.getElementById("saveSlot").value;
  localStorage.setItem(slot,JSON.stringify({
tension,
presence,
harmonic,
convergence,
breach,
alignment,
truth,
distortion
}));
  alert("Saved");
}

function loadCampaign(){

let slot=document.getElementById("saveSlot").value;
let data=localStorage.getItem(slot);

if(!data) return;

let s=JSON.parse(data);

tension=s.tension||0;
presence=s.presence||0;
harmonic=s.harmonic||0;
convergence=s.convergence||0;
breach=s.breach||0;

alignment=s.alignment||0;
truth=s.truth||0;
distortion=s.distortion||0;

location.reload();

}
function newCampaign(){
  localStorage.clear();
  location.reload();
}

let alignment = 0;
let truth = 0;
let distortion = 0;

window.onload = function(){

document.getElementById("alignmentValue").innerText = alignment;
document.getElementById("truthValue").innerText = truth;
document.getElementById("distortionValue").innerText = distortion;

updateTruth();

};

function changeAlignment(amount){

alignment += amount;

if(alignment > 10) alignment = 10;
if(alignment < -10) alignment = -10;

document.getElementById("alignmentValue").innerText = alignment;

}
function changeAlignment(amount){

alignment += amount;

if(alignment > 10) alignment = 10;
if(alignment < -10) alignment = -10;

document.getElementById("alignmentValue").innerText = alignment;

}


function changeTruth(amount){

truth += amount;

if(truth < 0) truth = 0;
if(truth > 10) truth = 10;

document.getElementById("truthValue").innerText = truth;

updateTruth();

}

function updateTruth(){

let msg = "";

if(truth >= 10) msg = "The Designer reveals its purpose.";
else if(truth >= 8) msg = "The fracture was caused by civilization.";
else if(truth >= 6) msg = "The Convergent Host origin is revealed.";
else if(truth >= 4) msg = "Hidden cave outcomes unlocked.";
else if(truth >= 2) msg = "You discover the Designer is a system intelligence.";

document.getElementById("truthMessage").innerText = msg;

}


function changeDistortion(amount){

distortion += amount;

if(distortion < 0) distortion = 0;

document.getElementById("distortionValue").innerText = distortion;

if(distortion % 3 === 0 && distortion !== 0){

triggerDistortion();

}

}

function triggerDistortion(){

let roll = Math.floor(Math.random()*6)+1;

let event = "";

switch(roll){

case 1:
event = "Gravity Fracture — units move -3 next round";
break;

case 2:
event = "Spatial Tear — spawn 1 Correction Entity";
break;

case 3:
event = "Harmonic Surge — Harmonic +1";
break;

case 4:
event = "Distortion Wave — all units roll D6, 1-3 take 2 damage";
break;

case 5:
event = "System Reinforcement — spawn 1 Convergent Scout";
break;

case 6:
event = "Stabilization — remove 1 distortion";
distortion -= 1;
document.getElementById("distortionValue").innerText = distortion;
break;

}

document.getElementById("distortionEvent").innerText = event;

}
